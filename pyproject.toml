[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# Sensible default set: pycodestyle + pyflakes + isort + modernisation + bug-likely.
select = ["E", "F", "I", "W", "UP", "B", "SIM"]
# Streamlit code deliberately uses unsafe_allow_html; test files use bare try patterns.
ignore = ["E501"]  # line length covered by formatter; allow long strings in tests

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # tests may use bare asserts freely
